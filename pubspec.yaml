name: app_grok_vending
description: Aplicação para máquina de vendas com NFC, QR Code e login Firebase
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


    
  # Fontes modernas e futuristas
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1

  # NFC e QR
  flutter_nfc_kit: ^3.5.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.2.1
  http: ^1.2.1

  firebase_database: ^11.1.4
  url_launcher: ^6.3.0
  # Estado e Firebase
  provider: ^6.1.2
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  shared_preferences: ^2.3.2

  # Ícones
  cupertino_icons: ^1.0.8

  # Design god tier futurista 2027
  glassmorphism: ^3.0.0          # Efeito vidro transparente premium
  animate_do: ^3.3.4             # Animações suaves e rápidas
  shimmer: ^3.0.0                # Efeito loading futurista
  neon_widgets: ^0.0.2           # Neon glow para textos e ícones
  flutter_animate: ^4.5.0        # Animações avançadas (fade, scale, glow)

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true



  assets:
    - assets/images/products/

    